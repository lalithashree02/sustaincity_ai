<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SustainCity AI - File Civic Complaint</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 40px; color: #333; }
        .form-card { max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 0 auto; }
        h2 { color: #2c3e50; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; margin-top:0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; }
        input[type="file"], textarea { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 6px; box-sizing: border-box; }
        textarea { height: 100px; resize: none; }
        .tab-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: 1px solid #2ecc71; background: white; color: #2ecc71; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .tab-btn.active { background: #2ecc71; color: white; }
        .gps-box { background: #e8f8f5; border: 1px dashed #2ecc71; padding: 15px; border-radius: 6px; text-align: center; font-weight: 500; color: #16a085; }
        .submit-btn { width: 100%; background: #2c3e50; color: white; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .submit-btn:hover { background: #1a252f; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>🌱 Report an Urban Issue</h2>
    <form action="/complaint" method="POST" enctype="multipart/form-data">
        
        <div class="form-group">
            <label for="problem_image">Upload Structural Proof Image</label>
            <input type="file" id="problem_image" name="problem_image" accept="image/*" required>
        </div>

        <div class="form-group">
            <label>Location Input Preference</label>
            <div class="tab-container">
                <button type="button" id="tab-manual" class="tab-btn active" onclick="switchLocationMode('manual')">✍️ Type Full Address</button>
                <button type="button" id="tab-gps" class="tab-btn" onclick="switchLocationMode('gps')">📍 Use Live GPS Location</button>
            </div>
        </div>

        <div id="wrapper-manual" class="form-group">
            <label for="full_address">Type Address Context Details</label>
            <textarea id="full_address" name="full_address" placeholder="Specify landmark, street name, sector, city, and pincode..." required></textarea>
        </div>

        <div id="wrapper-gps" class="form-group" style="display: none;">
            <div class="gps-box">
                <span id="gps-display-status">Coordinates unverified.</span>
                <input type="hidden" id="latitude" name="latitude">
                <input type="hidden" id="longitude" name="longitude">
            </div>
        </div>

        <button type="submit" class="submit-btn">Run AI Analysis & File Ticket</button>
    </form>
</div>

<script>
function switchLocationMode(mode) {
    const tabManual = document.getElementById('tab-manual');
    const tabGPS = document.getElementById('tab-gps');
    const wrapManual = document.getElementById('wrapper-manual');
    const wrapGPS = document.getElementById('wrapper-gps');
    const addressInput = document.getElementById('full_address');

    if (mode === 'manual') {
        tabManual.classList.add('active');
        tabGPS.classList.remove('active');
        wrapManual.style.display = 'block';
        wrapGPS.style.display = 'none';
        addressInput.required = true;
    } else {
        tabGPS.classList.add('active');
        tabManual.classList.remove('active');
        wrapManual.style.display = 'none';
        wrapGPS.style.display = 'block';
        addressInput.required = false;

        if (navigator.geolocation) {
            document.getElementById('gps-display-status').innerText = "📡 Connecting with satellite tracking GPS...";
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    document.getElementById('latitude').value = pos.coords.latitude;
                    document.getElementById('longitude').value = pos.coords.longitude;
                    document.getElementById('gps-display-status').innerHTML = `✅ <strong>Location Synced!</strong><br>Lat: ${pos.coords.latitude.toFixed(5)}, Lng: ${pos.coords.longitude.toFixed(5)}`;
                },
                (err) => {
                    document.getElementById('gps-display-status').innerText = "❌ Permission denied. Reverting to manual entry mode.";
                    switchLocationMode('manual');
                }
            );
        } else {
            alert("Your browser environment does not support GPS tracking.");
            switchLocationMode('manual');
        }
    }
}
</script>
</body>
</html>
