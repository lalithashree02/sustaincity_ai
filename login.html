<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Department Secure Portal Access Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background: #e2e8f0; display: flex; height: 100vh; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 10px; width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h3 { text-align: center; margin-top: 0; color: #1e293b; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { width:100%; background: #3b82f6; color: white; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .err { color: red; text-align: center; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3>🔑 Department Console Portal</h3>
        {% if error %}<p class="err">{{ error }}</p>{% endif %}
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Department Username Admin Account" required>
            <input type="password" name="password" placeholder="Terminal Passkey Access Code" required>
            <button type="submit">Access Workspace Queue</button>
        </form>
    </div>
</body>
</html>
